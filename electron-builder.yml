appId: com.transcriber.app
productName: Transcriber
icon: assets/icon-512.png
directories:
  output: dist

extraResources:
  - from: models/
    to: models/
    filter:
      - "**/*"
  - from: lib/diarize.py
    to: lib/diarize.py
  - from: lib/requirements.txt
    to: lib/requirements.txt
  - from: THIRD-PARTY-LICENSES.json
    to: THIRD-PARTY-LICENSES.json
  - from: "."
    to: "."
    filter:
      - ".debug-build"

win:
  target:
    - nsis
  extraResources:
    - from: bin/win/
      to: bin/win/
      filter:
        - "**/*"

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  artifactName: "${productName}-Setup-${version}.${ext}"

linux:
  target: AppImage
  category: AudioVideo
  extraResources:
    - from: bin/linux/
      to: bin/linux/
      filter:
        - "**/*"

mac:
  target: dmg
  category: public.app-category.utilities
  extraResources:
    - from: bin/mac/
      to: bin/mac/
      filter:
        - "**/*"

publish:
  provider: github
  owner: andrewjamesturner0
  repo: transcriber
