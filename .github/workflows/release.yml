name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    # CPU: pre-built download. Vulkan: built from source.
    # CPU download mirrors scripts/build.sh setup_win — keep in sync.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read deps.json
        id: deps
        shell: pwsh
        run: |
          $deps = Get-Content deps.json | ConvertFrom-Json
          echo "WHISPER_VERSION=$($deps.whisper.version)" >> $env:GITHUB_OUTPUT
          echo "VULKAN_SDK=$($deps.vulkanSdk)" >> $env:GITHUB_OUTPUT
          echo "MODEL_URL=$($deps.model.url)" >> $env:GITHUB_OUTPUT
          echo "FFMPEG_WIN_URL=$($deps.ffmpeg.win.url)" >> $env:GITHUB_OUTPUT

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ steps.deps.outputs.VULKAN_SDK }}
          install_runtime: false
          cache: true

      - name: Install dependencies
        run: npm install

      - name: Create directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin\win\cpu
          New-Item -ItemType Directory -Force -Path bin\win\vulkan
          New-Item -ItemType Directory -Force -Path models

      - name: Download whisper.cpp CPU binaries
        shell: pwsh
        run: |
          $V = "${{ steps.deps.outputs.WHISPER_VERSION }}"
          Invoke-WebRequest -Uri "https://github.com/ggml-org/whisper.cpp/releases/download/$V/whisper-bin-x64.zip" -OutFile whisper.zip
          Expand-Archive -Path whisper.zip -DestinationPath whisper-temp -Force
          Copy-Item whisper-temp\Release\* bin\win\cpu\ -Force
          Remove-Item whisper.zip, whisper-temp -Recurse -Force

      - name: Build whisper.cpp (Vulkan)
        shell: pwsh
        run: |
          $V = "${{ steps.deps.outputs.WHISPER_VERSION }}"
          git clone --depth 1 --branch $V https://github.com/ggml-org/whisper.cpp.git .build-whisper
          cmake -S .build-whisper -B .build-whisper/build-vulkan -DBUILD_SHARED_LIBS=ON -DGGML_VULKAN=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build .build-whisper/build-vulkan --config Release
          Copy-Item .build-whisper\build-vulkan\bin\Release\whisper-cli.exe bin\win\vulkan\
          Copy-Item .build-whisper\build-vulkan\bin\Release\whisper.dll bin\win\vulkan\
          Get-ChildItem .build-whisper\build-vulkan\bin\Release\ggml*.dll | Copy-Item -Destination bin\win\vulkan\

      - name: Download FFmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ steps.deps.outputs.FFMPEG_WIN_URL }}" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-temp -Force
          $ffmpegExe = Get-ChildItem -Path ffmpeg-temp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName bin\win\
          Remove-Item ffmpeg.zip, ffmpeg-temp -Recurse -Force

      - name: Download default model
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ steps.deps.outputs.MODEL_URL }}" -OutFile models\ggml-tiny.en.bin

      - name: Build
        run: npx electron-builder --win nsis -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist/*.exe
            dist/latest.yml

  build-linux:
    # Builds whisper.cpp from source (CPU + Vulkan) on Linux.
    # Mirrors scripts/build.sh setup_linux — keep in sync.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read deps.json
        id: deps
        run: |
          echo "WHISPER_VERSION=$(node -p "require('./deps.json').whisper.version")" >> "$GITHUB_OUTPUT"
          echo "MODEL_URL=$(node -p "require('./deps.json').model.url")" >> "$GITHUB_OUTPUT"
          echo "FFMPEG_URL=$(node -p "require('./deps.json').ffmpeg['linux-amd64'].url")" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++ libvulkan-dev glslc

      - name: Install dependencies
        run: npm install

      - name: Create directories
        run: mkdir -p bin/linux/cpu bin/linux/vulkan models

      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch ${{ steps.deps.outputs.WHISPER_VERSION }} https://github.com/ggml-org/whisper.cpp.git .build-whisper

      - name: Build whisper.cpp (CPU)
        run: |
          cmake -S .build-whisper -B .build-whisper/build-cpu -DCMAKE_BUILD_TYPE=Release
          cmake --build .build-whisper/build-cpu -j$(nproc) --config Release
          WHISPER_BIN=$(find .build-whisper/build-cpu -name "whisper-cli" -type f | head -1)
          cp "$WHISPER_BIN" bin/linux/cpu/whisper-cli
          chmod +x bin/linux/cpu/whisper-cli
          find .build-whisper/build-cpu -name "libwhisper.so*" -exec cp {} bin/linux/cpu/ \;
          find .build-whisper/build-cpu -name "libggml*.so*" -exec cp {} bin/linux/cpu/ \;

      - name: Build whisper.cpp (Vulkan)
        run: |
          cmake -S .build-whisper -B .build-whisper/build-vulkan -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=ON
          cmake --build .build-whisper/build-vulkan -j$(nproc) --config Release
          WHISPER_BIN=$(find .build-whisper/build-vulkan -name "whisper-cli" -type f | head -1)
          cp "$WHISPER_BIN" bin/linux/vulkan/whisper-cli
          chmod +x bin/linux/vulkan/whisper-cli
          find .build-whisper/build-vulkan -name "libwhisper.so*" -exec cp {} bin/linux/vulkan/ \;
          find .build-whisper/build-vulkan -name "libggml*.so*" -exec cp {} bin/linux/vulkan/ \;

      - name: Download FFmpeg
        run: |
          curl -L -o ffmpeg.tar.xz "${{ steps.deps.outputs.FFMPEG_URL }}"
          mkdir ffmpeg-temp
          tar -xf ffmpeg.tar.xz -C ffmpeg-temp
          find ffmpeg-temp -name "ffmpeg" -type f -exec cp {} bin/linux/ffmpeg \;
          chmod +x bin/linux/ffmpeg
          rm -rf ffmpeg.tar.xz ffmpeg-temp

      - name: Download default model
        run: |
          curl -L -o models/ggml-tiny.en.bin "${{ steps.deps.outputs.MODEL_URL }}"

      - name: Build
        run: npx electron-builder --linux AppImage -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/latest-linux.yml

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/windows-builds/*
            artifacts/linux-builds/*
