name: Dependency Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for dependency updates
        id: check
        run: |
          DEPS="deps.json"
          CHANGES=""

          # --- Check whisper.cpp ---
          CURRENT_WHISPER=$(node -p "require('./$DEPS').whisper.version")
          LATEST_WHISPER=$(curl -s "https://api.github.com/repos/ggml-org/whisper.cpp/releases/latest" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).tag_name")

          if [ "$CURRENT_WHISPER" != "$LATEST_WHISPER" ]; then
            echo "whisper.cpp: $CURRENT_WHISPER -> $LATEST_WHISPER"
            CHANGES="${CHANGES}whisper.cpp: ${CURRENT_WHISPER} → ${LATEST_WHISPER}\n"
            # Update deps.json
            node -e "
              const fs = require('fs');
              const deps = JSON.parse(fs.readFileSync('$DEPS', 'utf8'));
              deps.whisper.version = '$LATEST_WHISPER';
              fs.writeFileSync('$DEPS', JSON.stringify(deps, null, 2) + '\n');
            "
          fi

          # --- Check ffmpeg (checksum-based) ---
          check_ffmpeg() {
            local key="$1" url="$2"
            local stored_sha=$(node -p "require('./$DEPS').ffmpeg['$key'].sha256")
            local current_sha=$(curl -sL "$url" | sha256sum | cut -d' ' -f1)

            if [ -n "$stored_sha" ] && [ "$stored_sha" != "$current_sha" ]; then
              echo "ffmpeg ($key): checksum changed"
              CHANGES="${CHANGES}ffmpeg ($key): checksum changed (binary updated upstream)\n"
            fi

            # Always update the stored checksum
            node -e "
              const fs = require('fs');
              const deps = JSON.parse(fs.readFileSync('$DEPS', 'utf8'));
              deps.ffmpeg['$key'].sha256 = '$current_sha';
              fs.writeFileSync('$DEPS', JSON.stringify(deps, null, 2) + '\n');
            "
          }

          FFMPEG_WIN_URL=$(node -p "require('./$DEPS').ffmpeg.win.url")
          FFMPEG_AMD64_URL=$(node -p "require('./$DEPS').ffmpeg['linux-amd64'].url")
          FFMPEG_ARM64_URL=$(node -p "require('./$DEPS').ffmpeg['linux-arm64'].url")

          check_ffmpeg "win" "$FFMPEG_WIN_URL"
          check_ffmpeg "linux-amd64" "$FFMPEG_AMD64_URL"
          check_ffmpeg "linux-arm64" "$FFMPEG_ARM64_URL"

          # --- Output results ---
          if [ -n "$CHANGES" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            # Multiline output
            {
              echo "summary<<EOF"
              echo -e "$CHANGES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.check.outputs.has_updates == 'true'
        run: |
          BRANCH="deps/auto-update-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add deps.json
          git commit -m "deps: update dependency versions

          ${{ steps.check.outputs.summary }}

          Auto-generated by dep-check workflow."
          git push -u origin "$BRANCH"

          gh pr create \
            --title "deps: update dependency versions" \
            --body "$(cat <<'EOF'
          ## Dependency Updates

          ${{ steps.check.outputs.summary }}

          This PR was auto-generated by the weekly dependency check workflow.

          **Next steps:**
          1. Review the changes in `deps.json`
          2. Merge to trigger a release build
          3. Test the built artifacts before publishing
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update checksums (no version changes)
        if: steps.check.outputs.has_updates == 'false'
        run: |
          # If only checksums were updated (first run or no changes), commit directly
          if ! git diff --quiet deps.json; then
            git add deps.json
            git commit -m "deps: update ffmpeg checksums (no version changes)"
            git push
          else
            echo "No changes detected."
          fi
